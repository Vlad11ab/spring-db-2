server:
  port: ${SERVER_PORT:8082}
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/spring_db_2?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HikariPool
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

application:
  jwt:
    tokenPrefix: "Bearer "
    tokenExpirationAfterDays: 7
    secretKey: ${JWT_SECRET_KEY:asdasdasdasdasd123344asdasdasdasdasasd12321332sadas}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    firstName: ${BOOTSTRAP_ADMIN_FIRST_NAME:Super}
    lastName: ${BOOTSTRAP_ADMIN_LAST_NAME:Admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:superadmin@online-school.local}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:SuperAdmin123!}
    age: ${BOOTSTRAP_ADMIN_AGE:30}
    nrCrediteNecesare: ${BOOTSTRAP_ADMIN_NR_CREDITE_NECESARE:999}
    nrCrediteEfectuate: ${BOOTSTRAP_ADMIN_NR_CREDITE_EFECTUATE:999}
