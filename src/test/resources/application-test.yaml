spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

application:
  jwt:
    secretKey: test-secret-key-test-secret-key-test-secret-key-1234567890-extra
    tokenPrefix: "Bearer "
    tokenExpirationAfterDays: 7
  bootstrap-admin:
    enabled: false
